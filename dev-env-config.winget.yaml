# Winget configuration for a fresh Windows developer environment.
# This file uses long-term supported (LTS) package choices where the package ecosystem exposes them.
# Save this file as dev-env-config.winget.yaml and run:
#   winget configure --file .\dev-env-config.winget.yaml

properties:
  configurationVersion: 0.2.0
  resources:
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-powershell
      directives:
        description: Install PowerShell
        allowPrereleases: false
      settings:
        id: Microsoft.PowerShell
        source: winget
        version: "7.4.7"

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-git
      directives:
        description: Install Git
        allowPrereleases: false
      settings:
        id: Git.Git
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-nvm-for-windows
      directives:
        description: Install nvm for Windows
        allowPrereleases: false
      settings:
        id: CoreyButler.NVMforWindows
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-dotnet-sdk
      directives:
        description: Install the .NET SDK
        allowPrereleases: false
      settings:
        id: Microsoft.DotNet.SDK.8
        source: winget
        version: "8.0.100"

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-vcpp-redistributable
      directives:
        description: Install the Visual C++ Redistributable required by Visual Studio components
        allowPrereleases: false
      settings:
        id: Microsoft.VCRedist.2015+.x64
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-vscode
      directives:
        description: Install Visual Studio Code
        allowPrereleases: false
      settings:
        id: Microsoft.VisualStudioCode
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-visual-studio
      directives:
        description: Install Visual Studio 2022 Community
        allowPrereleases: false
      settings:
        id: Microsoft.VisualStudio.2022.Community
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-neovim
      directives:
        description: Install Neovim
        allowPrereleases: false
      settings:
        id: Neovim.Neovim
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-docker-cli
      directives:
        description: Install Docker CLI
        allowPrereleases: false
      settings:
        id: Docker.DockerCLI
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-docker-desktop
      directives:
        description: Install Docker Desktop
        allowPrereleases: false
      settings:
        id: Docker.DockerDesktop
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-python
      directives:
        description: Install Python 3.12
        allowPrereleases: false
      settings:
        id: Python.Python.3.12
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-gcc-gpp
      directives:
        description: Install GCC and G++
        allowPrereleases: false
      settings:
        id: TDM-GCC.TDM-GCC
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-gdb
      directives:
        description: Install GDB
        allowPrereleases: false
      settings:
        id: GNU.GDB
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-notepad-plus-plus
      directives:
        description: Install Notepad++
        allowPrereleases: false
      settings:
        id: Notepad++.Notepad++
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-steam
      directives:
        description: Install Steam
        allowPrereleases: false
      settings:
        id: Valve.Steam
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-firefox
      directives:
        description: Install Firefox
        allowPrereleases: false
      settings:
        id: Mozilla.Firefox
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-enpass
      directives:
        description: Install Enpass
        allowPrereleases: false
      settings:
        id: Enpass.Enpass
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-r
      directives:
        description: Install R
        allowPrereleases: false
      settings:
        id: RProject.R
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-rstudio
      directives:
        description: Install RStudio
        allowPrereleases: false
      settings:
        id: RStudio.RStudio
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: install-vlc
      directives:
        description: Install VLC media player
        allowPrereleases: false
      settings:
        id: VideoLAN.VLC
        source: winget
